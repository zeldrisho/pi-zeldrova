name: Pi Code Assist

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pi-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Repository secrets are unavailable to fork and Dependabot pull requests.
    if: github.event.pull_request.head.repo.fork == false && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0

      - name: Install workspace dependencies
        run: vp install --frozen-lockfile --ignore-scripts

      - id: pi
        uses: zeldrisho/pi-code-assist@32e52539145d08582ee7e6fb2ecb7f8595c93e57 # v2.0.0
        with:
          api-key: ${{ secrets.OPENCODE_API_KEY }}
          provider: opencode
          model: deepseek-v4-flash-free
          pi-version: 0.80.10
          github-tools: read
          tools: all
          project-trust: true
          packages: |
            ./packages/pi-web-search
            ./packages/pi-web-fetch
          prompt: |
            Review the current pull request using the GitHub PR diff, existing PR comments,
            checked-out files, docs/security.md, and docs/development.md. Read the README and
            tests for each affected package.

            Report only new, verified, actionable defects introduced by this PR. Prioritize:
            - correctness, runtime failures, races, cancellation, and error handling;
            - security boundaries involving paths, symlinks, SSRF, redirects, credentials,
              untrusted content, shell input, and workflow permissions;
            - backward compatibility of exports, tool schemas, and package behavior;
            - missing tests for changed behavior and failure paths;
            - unbounded bytes, lines, memory, loops, caches, or temporary resources; and
            - package independence, dependency placement, and published-file allowlists.

            Apply package-specific invariants from docs/security.md. Do not report style
            preferences, pre-existing issues, intentional documented behavior, or findings
            already resolved on the current PR head. Verify every claim against source or
            tests before reporting it.

            For each finding provide its severity (blocker, high, or medium), exact file and
            line, concrete failure scenario and impact, and the smallest practical fix.

            Return at most 5 findings and 400 words. Omit summaries, praise, tables, verdicts,
            low-value suggestions, and self-corrections. If no qualifying findings exist,
            respond exactly: "No actionable findings."

      - name: Post review
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RESPONSE_FILE: ${{ steps.pi.outputs.response-path }}
        run: |
          marker='<!-- pi-code-assist-review -->'
          body_file="$RUNNER_TEMP/pi-code-assist-review.md"
          printf '%s\n\n' "$marker" > "$body_file"
          cat "$RESPONSE_FILE" >> "$body_file"

          comment_id=$(gh api --paginate \
            "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
            --jq ".[] | select(.user.login == \"github-actions[bot]\" and (.body | startswith(\"$marker\"))) | .id" \
            | tail -n 1)

          if [[ -z "$comment_id" ]]; then
            comment_id=$(gh api --paginate \
              "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
              --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("## Code Review"))) | .id' \
              | tail -n 1)
          fi

          if [[ -n "$comment_id" ]]; then
            jq -Rs '{ body: . }' "$body_file" | gh api --method PATCH \
              "repos/$GITHUB_REPOSITORY/issues/comments/$comment_id" --input -
          else
            jq -Rs '{ body: . }' "$body_file" | gh api --method POST \
              "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" --input -
          fi
