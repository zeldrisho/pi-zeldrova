packages:
  - "packages/*"

allowBuilds:
  "@google/genai": false
  koffi: false
  protobufjs: false

catalog:
  "@earendil-works/pi-ai": "^0.80.10"
  "@earendil-works/pi-coding-agent": "^0.80.10"
  "@earendil-works/pi-tui": "^0.80.10"
  "@types/node": "^26.1.1"
  "@vitest/coverage-v8": "4.1.10"
  typebox: "^1.1.24"
  typescript: "^5.0.0"
  vite: "npm:@voidzero-dev/vite-plus-core@0.2.5"
  vite-plus: "0.2.5"
  vitest: "4.1.10"

overrides:
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
